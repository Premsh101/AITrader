version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    container_name: aitrader_app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://trader:trader_pass@db:5432/aitrader
    # Bound to loopback: a reverse proxy (e.g. Coolify) should be the only
    # public entry point. Adjust if your proxy connects over a docker network.
    ports:
      - "127.0.0.1:8005:8000"
    volumes:
      - ./logs:/app/logs
    depends_on:
      db:
        condition: service_healthy

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend
      args:
        # Baked into the client bundle at build time (Next.js NEXT_PUBLIC_*).
        NEXT_PUBLIC_API_URL: http://localhost:8005
        NEXT_PUBLIC_API_KEY: ${NEXT_PUBLIC_API_KEY:-}
    container_name: aitrader_dashboard
    restart: unless-stopped
    # Loopback-bound like the API; expose only via the reverse proxy.
    ports:
      - "127.0.0.1:8006:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8005
    depends_on:
      - app

  db:
    image: postgres:16-alpine
    container_name: aitrader_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: trader
      POSTGRES_PASSWORD: trader_pass
      POSTGRES_DB: aitrader
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Loopback-only: Postgres must never be reachable from the internet.
    ports:
      - "127.0.0.1:5438:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trader -d aitrader"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local

version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    container_name: aitrader_app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://trader:trader_pass@db:5432/aitrader
    ports:
      - "8005:8000"
    volumes:
      - ./logs:/app/logs
    depends_on:
      db:
        condition: service_healthy

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend
    container_name: aitrader_dashboard
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8005
    depends_on:
      - app

  db:
    image: postgres:16-alpine
    container_name: aitrader_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: trader
      POSTGRES_PASSWORD: trader_pass
      POSTGRES_DB: aitrader
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5438:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trader -d aitrader"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
